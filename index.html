<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberHawk Dashboard</title>
</head>
<body>
  <h1>CyberHawk Dashboard</h1>

  <!-- Auth -->
  <div id="auth">
    <h2>Sign Up / Login</h2>
    <input id="name" placeholder="Name (signup)" />
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signup">Sign Up</button>
    <button id="login">Login</button>
  </div>

  <!-- Add Post -->
  <div id="postSection" style="display:none;">
    <h2>Add Post</h2>
    <input id="postTitle" placeholder="Title" />
    <textarea id="postContent" placeholder="Content"></textarea>
    <button id="addPost">Add Post</button>
    <h3>Posts</h3>
    <ul id="postList"></ul>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabaseUrl = 'https://your-project.supabase.co'
  const supabaseAnonKey = 'your-anon-key'
  const supabase = createClient(supabaseUrl, supabaseAnonKey)

  let token = null

  const authDiv = document.getElementById('auth')
  const postSection = document.getElementById('postSection')
  const postList = document.getElementById('postList')

  async function signup() {
    const name = document.getElementById('name').value
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const res = await fetch('http://localhost:3000/api/auth/signup', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name,email,password})
    })
    const data = await res.json()
    token = data.token
    authDiv.style.display='none'
    postSection.style.display='block'
    fetchPosts()
  }

  async function login() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const res = await fetch('http://localhost:3000/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email,password})
    })
    const data = await res.json()
    token = data.token
    authDiv.style.display='none'
    postSection.style.display='block'
    fetchPosts()
  }

  async function fetchPosts() {
    const res = await fetch('http://localhost:3000/api/posts', {
      headers:{'Authorization':'Bearer '+token}
    })
    const data = await res.json()
    postList.innerHTML = ''
    data.forEach(p=>{
      const li=document.createElement('li')
      li.textContent=`${p.title}: ${p.content}`
      postList.appendChild(li)
    })
  }

  document.getElementById('signup').addEventListener('click', signup)
  document.getElementById('login').addEventListener('click', login)

  document.getElementById('addPost').addEventListener('click', async ()=>{
    const title = document.getElementById('postTitle').value
    const content = document.getElementById('postContent').value
    await fetch('http://localhost:3000/api/posts', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+token
      },
      body: JSON.stringify({title,content})
    })
    fetchPosts()
  })
</script>
</body>
</html>
